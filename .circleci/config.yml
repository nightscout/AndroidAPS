 # Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/2.0/configuration-reference
version: 2.1

# Orbs are reusable packages of CircleCI configuration that you may share across projects, enabling you to create encapsulated, parameterized commands, jobs, and executors that can be used across multiple projects.
orbs:
  android: circleci/android@2.4.0
  codecov: codecov/codecov@3.3.0

jobs:
  # Compile job: compiles sources and persists the workspace for downstream jobs
  compile:
    machine: true
    resource_class: nightscout/android

    steps:
      - run:
          name: Skip CircleCI on pull requests
          command: |
            if [ -n "${CIRCLE_PULL_REQUEST:-}" ]; then
              echo "Pull request detected; skipping CircleCI job."
              circleci-agent step halt
            fi

      - checkout

      - run:
          name: Run compileFullDebugAndroidTestSources
          command: |
            export ANDROID_SDK_ROOT=/usr/lib/android-sdk
            export ANDROID_HOME=/usr/lib/android-sdk
            env
            ./gradlew \
            -Dorg.gradle.jvmargs="-Xmx8g -XX:+UseParallelGC -Xss4m" \
            -Dkotlin.daemon.jvm.options="-Xmx2g" \
            -Dkotlin.compiler.execution.strategy="in-process" \
            -Dorg.gradle.daemon=true \
            compileFullDebugAndroidTestSources

      - persist_to_workspace:
          root: .
          paths:
            - .

  # Unit test job: runs in parallel with instrumented-test
  unit-test:
    machine: true
    resource_class: nightscout/android

    steps:
      - attach_workspace:
          at: .

      - run:
          name: Run testFullDebugUnitTest
          command: |
            export ANDROID_SDK_ROOT=/usr/lib/android-sdk
            export ANDROID_HOME=/usr/lib/android-sdk
            ./gradlew \
            -Dorg.gradle.jvmargs="-Xmx8g -XX:+UseParallelGC -Xss4m" \
            -Dkotlin.daemon.jvm.options="-Xmx2g" \
            -Dkotlin.compiler.execution.strategy="in-process" \
            -Dorg.gradle.workers.max=22 \
            -Dorg.gradle.daemon=true \
            testFullDebugUnitTest

      - run:
          name: Save unit test results
          command: |
            mkdir -p ~/test-results/junit/
            find . -type f -regex ".*/build/test-results/.*xml" -exec cp {} ~/test-results/junit/ \;
          when: always

      - store_test_results:
          path: ~/test-results

      - store_artifacts:
          path: ~/test-results/junit

      - persist_to_workspace:
          root: .
          paths:
            - "*/build/test-results"

  # Instrumented test job: runs in parallel with unit-test
  instrumented-test:
    machine: true
    resource_class: nightscout/android

    steps:
      - attach_workspace:
          at: .

      - run:
          name: Create avd
          command: |
            echo "no" | /usr/lib/android-sdk/cmdline-tools/13.0/bin/avdmanager --verbose create avd -n citest -k "system-images;android-31;google_apis_playstore;x86_64" --force

      - run:
          name: Launch emulator
          command: |
            export ANDROID_SDK_ROOT=/usr/lib/android-sdk
            export ANDROID_HOME=/usr/lib/android-sdk
            emulator -avd citest -delay-adb -verbose -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          background: true

      - run:
          name: Run connectedFullDebugAndroidTest
          command: |
            export ANDROID_SDK_ROOT=/usr/lib/android-sdk
            export ANDROID_HOME=/usr/lib/android-sdk
            env
            ./gradlew \
            -Dorg.gradle.jvmargs="-Xmx8g -XX:+UseParallelGC -Xss4m" \
            -Dkotlin.daemon.jvm.options="-Xmx2g" \
            -Dkotlin.compiler.execution.strategy="in-process" \
            -Dorg.gradle.daemon=true \
            connectedFullDebugAndroidTest

      - run:
          name: Kill emulators
          command: |
            echo "Killing emulators"
            adb devices | grep emulator | cut -f1 | while read -r line; do adb -s $line emu kill; done

      - run:
          name: Save instrumented test results
          command: |
            mkdir -p ~/test-results/junit/
            find . -type f -regex ".*/build/outputs/androidTest-results/.*xml" -exec cp {} ~/test-results/junit/ \;
          when: always

      - store_test_results:
          path: ~/test-results

      - store_artifacts:
          path: ~/test-results/junit

      - persist_to_workspace:
          root: .
          paths:
            - "*/build/outputs/androidTest-results"

      - run:
          name: Kill java processes
          command: |
            killall java
          when: always

  # Coverage job: depends on both test jobs, merges and uploads coverage
  coverage:
    machine: true
    resource_class: nightscout/android

    steps:
      - attach_workspace:
          at: .

      - run:
          name: Run jacocoAllDebugReport
          command: |
            export ANDROID_SDK_ROOT=/usr/lib/android-sdk
            export ANDROID_HOME=/usr/lib/android-sdk
            ./gradlew --stacktrace jacocoAllDebugReport

      - codecov/upload:
          file: './build/reports/jacoco/jacocoAllDebugReport/jacocoAllDebugReport.xml'

      - run:
          name: Kill java processes
          command: |
            killall java
          when: always

workflows:
  # CircleCI will run this workflow on every commit.
  # unit-test and instrumented-test run in parallel after compile, then coverage runs last.
  dotests:
    jobs:
      - compile
      - unit-test:
          requires:
            - compile
      - instrumented-test:
          requires:
            - compile
      - coverage:
          requires:
            - unit-test
            - instrumented-test
